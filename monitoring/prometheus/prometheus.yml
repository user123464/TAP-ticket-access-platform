global:
    # 每 15 秒抓一次 Metrics
    scrape_interval: 15s

scrape_configs:
    # 就是這個 Target 的名稱
    # springboot
    - job_name: "spring-boot"
      # 預設抓 /metrics 但是 Spring Boot Actuator 是：/actuator/prometheus
      metrics_path: "/actuator/prometheus"

      static_configs:
          - targets:
                - "host.docker.internal:8080"
    # Rabbit MQ
    - job_name: "rabbitmq"
      static_configs:
          - targets:
                - rabbitmq:15692
    # Redis
    - job_name: "redis"
      static_configs:
          - targets:
                - redis-exporter:9121
