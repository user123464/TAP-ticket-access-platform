<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>【TAP 票務平台】合作夥伴組織加入邀請</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f6f9fc; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;">
    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="table-layout: fixed;">
        <tr>
            <td align="center" style="padding: 40px 0;">
                <table border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 600px; background-color: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);">
                    <!-- 頂部品牌 Logo 區 -->
                    <tr>
                        <td align="center" style="padding: 30px 0 20px 0; border-bottom: 1px solid #edf2f7;">
                            <span style="font-size: 26px; font-weight: 700; color: #e57346; letter-spacing: -0.5px;">TAP 票務平台</span>
                        </td>
                    </tr>
                    <!-- 信件主體內容 -->
                    <tr>
                        <td style="padding: 40px 30px; color: #2d3748; font-size: 16px; line-height: 1.6;">
                            <p style="margin-top: 0; font-weight: 600; font-size: 18px;">您好！</p>
                            <p>我們非常榮幸地通知您，您已受邀加入組織：<strong style="color: #e57346;">{{orgName}}</strong>，共同進行票券與活動管理工作。</p>
                            <p>請點擊下方按鈕以接受此邀請並加入組織。此邀請連結將於 <strong style="color: #e57346;">24 小時後過期</strong>：</p>
                            
                            <!-- 接受邀請按鈕區區塊 -->
                            <table border="0" cellpadding="0" cellspacing="0" width="100%" style="margin: 30px 0;">
                                <tr>
                                    <td align="center">
                                        <a href="{{inviteUrl}}" style="background-color: #e57346; color: #ffffff; padding: 14px 30px; text-decoration: none; font-weight: bold; border-radius: 8px; display: inline-block; font-size: 16px; box-shadow: 0 4px 6px rgba(229, 115, 70, 0.2);">接受邀請並加入組織</a>
                                    </td>
                                </tr>
                            </table>
                            
                            <p style="font-size: 13px; color: #718096; line-height: 1.5; margin-bottom: 0; background-color: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #edf2f7; word-break: break-all;">
                                如果上方按鈕無法點選，請複製此網址在瀏覽器中開啟：<br>
                                <a href="{{inviteUrl}}" style="color: #e57346; text-decoration: none;">{{inviteUrl}}</a>
                            </p>
                        </td>
                    </tr>
                    <!-- 頁尾 -->
                    <tr>
                        <td align="center" style="padding: 20px 30px; background-color: #f7fafc; border-top: 1px solid #edf2f7; font-size: 12px; color: #a0aec0;">
                            <p style="margin: 0 0 5px 0;">這是一封自動發送的郵件，請勿直接回覆。</p>
                            <p style="margin: 0;">© 2026 Ticket Access Platform. All rights reserved.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
