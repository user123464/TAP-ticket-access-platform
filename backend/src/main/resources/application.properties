spring.application.name=labboot-back

spring.profiles.active=@xxx@
spring.profiles.validate=false

# 1. 指定連線的資料庫驅動與 URL
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:9433;databaseName=ProjectDB;encrypt=false}
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# 2. 資料庫的管理員帳號與密碼
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:P@ssw0rd}

# 3. 開發助手：將 Hibernate 產生的底層 SQL 語法列印在 Console 面板上
#壓力測試期間關閉
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 4. 指定資料庫初始化模式
# 當專案剛建立或是需要測試環境時，通常有兩種常見的資料庫結構與資料初始化方式：
#
# 【方式一】由 Hibernate 自動對映 Entity 產生資料表，可用參數為
# - none        : 預設值，Location關閉自動建表功能。
# - validate    : 驗證現有資料表結構是否與 Entity 吻合，若不符合將拋出錯誤終止啟動，不會擅自修改資料庫結構。
# - update      : 保留現有測試資料，僅自動更新已被修改的 Entity 欄位結構。
# - create      : 每次專案啟動時，都會刪除舊有表格並重新建立。
# - create-drop : 啟動時自動建表，而當專案關閉時，便自動刪除這些表格，常用於單元測試驗證環境。
spring.jpa.hibernate.ddl-auto=validate

# 【方式二】結合 Spring 原生機制，執行自定義的 SQL 腳本，可用參數為
# - always   : 每次專案啟動時皆會執行指定的 SQL 檔案。適合初期開發階段，幫助我們每次重啟都能擁有一份乾淨的測試資料。
# - embedded : 預設值，僅在使用記憶體資料庫 (如 H2) 時才會執行腳本。若連線的是真實資料庫則不會觸發。
# - never    : 關閉執行腳本功能，通常用於正式環境防止意外覆蓋資料。
spring.sql.init.mode=always

# 指定負責建立表格結構 Schema 與寫入測試資料 Data 的腳本位置
# classpath 前綴代表路徑起始於專案的 src/main/resources 目錄
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# 控制 Hibernate Session（JPA EntityManager）什麼時候關閉。
# 前後端分離 會加上此設定 避免未來debug難找問題
spring.jpa.open-in-view=true

# 防止 data.sql 執行順序錯亂的保險
# 不能加，會導致.sql無法執行
# spring.jpa.defer-datasource-initialization=true

# 開啟 JDBC Batch 寫入，並將打包大小設為 50 (對應 Entity 的 allocationSize)
spring.jpa.properties.hibernate.jdbc.batch_size=50
# 讓 Hibernate 自動把相同的 INSERT 語句排序並整理在一起，提高打包效率
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# .sql執行日誌，檢查目前的 saveAll() 流程是否真的會觸發 Hibernate Batch
spring.jpa.properties.hibernate.generate_statistics=false

#壓力測試期間關閉
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
# .sql執行日誌
logging.level.org.springframework.jdbc.datasource.init=DEBUG

# =====================================================================
# JWT 安全設定 (以正式上線安全防護為設計目標)
# =====================================================================
# ⚠️ 重要警告：
# 1. 本機開發環境可省略此環境變數，系統會預設使用後方的開發用預設金鑰。
# 2. 【正式上線時】請務必在系統環境變數中設定 JWT_SECRET，避免使用預設金鑰！
# 3. 金鑰長度必須大於或等於 256-bit (32 字元/位元組) 以確保 HMAC-SHA 演算法的安全性。
# =====================================================================
jwt.secret=${JWT_SECRET:h!/QXpi^uk]Q^7aFm)XdOh1;doO_!Gfm}
# JWT Token 的過期時間，單位為秒。預設為 86400 秒 (也就是 24 小時 / 1 天)
jwt.expiration=86400

# =====================================================================
# Redis 連線設定
# =====================================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:9979}
spring.data.redis.password=${REDIS_PASSWORD:auth_dev_pwd}
# 後端啟動時自動清空 Redis 快取數據 (比照資料庫 SQL 初始化重置的設定)
app.redis.flush-on-startup=true

# =====================================================================
# 彈性郵件連線設定（預設為 Maildev 本地沙盒；注入環境變數時對接 Brevo）
# =====================================================================
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:9025}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:false}
spring.mail.properties.mail.smtp.starttls.required=${SMTP_STARTTLS_REQUIRED:false}

# 發信人信箱與顯示名稱已移至外部 documents/mail-config.properties 動態管理，不需重啟即可即時生效

# =====================================================================
# Google 登入（OAuth 2.0 / Google Identity Services）
# client-id 為公開值（前端也會用到），用於後端驗證 ID Token 的 audience
# =====================================================================
google.oauth.client-id=${GOOGLE_CLIENT_ID:678795144571-bi5hmrhcubel1d47bue31sq094ivohlm.apps.googleusercontent.com}

# =====================================================================
# 外部說明文件與 Email 樣板儲存路徑
# =====================================================================
app.documents.dir=./documents

# =====================================================================
# 檔案上傳大小限制
# max-file-size: 單檔上限（KYC 文件最大 15MB）
# max-request-size: 整個 multipart 請求上限
# =====================================================================
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=25MB

# =====================================================================
# RabbitMQ Connection Settings
# =====================================================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
# Publisher Confirms & Returns
# correlated: Enable publisher confirms to check if message reached Exchange
spring.rabbitmq.publisher-confirm-type=correlated
# true: Enable publisher returns if message cannot find Queue
spring.rabbitmq.publisher-returns=true
# Consumer manual ACK mechanism
# Set to manual so Consumer must explicitly call basicAck
spring.rabbitmq.listener.simple.acknowledge-mode=manual
# Prefetch count to prevent overloading the Consumer
spring.rabbitmq.listener.simple.prefetch=10

# =====================================================================
# Logging Settings
# =====================================================================
# Force Console output to use UTF-8
logging.charset.console=UTF-8
# Log file path and name
logging.file.name=logs/ticket-system.log
# Force Log file to use UTF-8
logging.charset.file=UTF-8
# Max file size before rolling over
logging.logback.rollingpolicy.max-file-size=10MB

# =====================================================================
# Metrics and Performance Monitoring
# =====================================================================
# Actuator endpoints exposure list
management.endpoints.web.exposure.include=health,info,metrics,prometheus
# Show full health details
management.endpoint.health.show-details=always
# Enable Prometheus export
management.prometheus.metrics.export.enabled=true
# Enable percentile histograms for http server requests
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Prometheus server URL for backend proxy queries
app.prometheus.url=http://localhost:9090/api/v1

# =====================================================================
# Tomcat High Concurrency Tuning Parameters
# =====================================================================
# 1. Max active worker threads (default 200 -> increased to 800)
server.tomcat.threads.max=800
# 2. OS-level TCP accept queue size (default 100 -> increased to 2000)
server.tomcat.accept-count=2000
# 3. Max connections allowed to be held
server.tomcat.max-connections=10000

